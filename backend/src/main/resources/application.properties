spring.application.name=spire-backend
server.port=8080

# MySQL Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/spire?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:abhizoe7}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=${JWT_SECRET:defaultSecretKeyThatShouldBeChangedInProduction0123456789}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Razorpay
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder_secret}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}
