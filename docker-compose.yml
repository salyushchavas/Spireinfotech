version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: spire-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: spire
      POSTGRES_USER: spire
      POSTGRES_PASSWORD: spire_secret
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: spire-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spire
      SPRING_DATASOURCE_USERNAME: spire
      SPRING_DATASOURCE_PASSWORD: spire_secret
      JWT_SECRET: change-me-in-production
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-placeholder_secret}

  frontend:
    build: ./frontend
    container_name: spire-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
      NEXT_PUBLIC_RAZORPAY_KEY: ${RAZORPAY_KEY_ID:-rzp_test_placeholder}

volumes:
  pgdata:
